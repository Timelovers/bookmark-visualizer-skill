<head>
<meta charset="UTF-8">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Courier+Prime:wght@400;700&family=VT323&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f0a;
    --surface: #111409;
    --panel: #161810;
    --border: #2a2e1a;
    --border-bright: #3d4420;
    --green: #7aff4a;
    --green-dim: #4a9930;
    --green-faint: #1e3310;
    --amber: #ffb830;
    --amber-dim: #9c6e00;
    --cyan: #4affec;
    --cyan-dim: #1a7a72;
    --text: #c8d4a0;
    --text-dim: #6a7a50;
    --text-faint: #3a4530;
    --red: #ff4a4a;
    --scanline: rgba(0,0,0,0.15);
    --glow-green: 0 0 8px rgba(122,255,74,0.4), 0 0 20px rgba(122,255,74,0.1);
    --glow-amber: 0 0 8px rgba(255,184,48,0.4), 0 0 20px rgba(255,184,48,0.1);
    --glow-cyan: 0 0 8px rgba(74,255,236,0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', 'Courier Prime', monospace;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* CRT scanlines overlay */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      var(--scanline) 0px,
      var(--scanline) 1px,
      transparent 1px,
      transparent 3px
    );
    pointer-events: none;
    z-index: 1000;
    animation: scanroll 8s linear infinite;
  }

  /* Noise texture */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.4;
  }

  @keyframes scanroll {
    0% { background-position: 0 0; }
    100% { background-position: 0 100vh; }
  }

  @keyframes blink {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0; }
  }

  @keyframes flicker {
    0%, 95%, 100% { opacity: 1; }
    96% { opacity: 0.8; }
    97% { opacity: 1; }
    98% { opacity: 0.6; }
    99% { opacity: 1; }
  }

  @keyframes glow-pulse {
    0%, 100% { text-shadow: var(--glow-green); }
    50% { text-shadow: 0 0 15px rgba(122,255,74,0.8), 0 0 30px rgba(122,255,74,0.3); }
  }

  @keyframes slide-in {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  @keyframes fadeup {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* HEADER */
  header {
    border-bottom: 1px solid var(--border-bright);
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    animation: flicker 10s ease-in-out infinite;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'VT323', monospace;
    font-size: 2.2rem;
    color: var(--green);
    text-shadow: var(--glow-green);
    letter-spacing: 2px;
    animation: glow-pulse 3s ease-in-out infinite;
  }

  .logo span {
    color: var(--amber);
    text-shadow: var(--glow-amber);
  }

  .header-meta {
    font-size: 0.72rem;
    color: var(--text-dim);
    text-align: right;
    line-height: 1.8;
  }

  .header-meta .count {
    color: var(--green);
    font-size: 0.85rem;
  }

  .nav-bar {
    display: flex;
    gap: 0;
    padding: 0 24px;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .nav-bar::-webkit-scrollbar { display: none; }

  .nav-tab {
    padding: 8px 16px;
    font-size: 0.75rem;
    color: var(--text-dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all 0.15s;
    letter-spacing: 1px;
    text-transform: uppercase;
    user-select: none;
  }

  .nav-tab:hover {
    color: var(--green);
    border-bottom-color: var(--green-dim);
  }

  .nav-tab.active {
    color: var(--green);
    border-bottom-color: var(--green);
    text-shadow: var(--glow-green);
  }

  /* MAIN LAYOUT */
  .layout {
    display: grid;
    grid-template-columns: 220px 1fr;
    min-height: calc(100vh - 100px);
  }

  /* SIDEBAR */
  .sidebar {
    border-right: 1px solid var(--border);
    padding: 20px 0;
    position: sticky;
    top: 100px;
    height: calc(100vh - 100px);
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border-bright) transparent;
  }

  .sidebar-section {
    padding: 6px 16px;
    font-size: 0.6rem;
    color: var(--text-faint);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 16px;
  }

  .sidebar-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 16px;
    cursor: pointer;
    font-size: 0.75rem;
    color: var(--text-dim);
    transition: all 0.1s;
    border-left: 2px solid transparent;
    gap: 8px;
  }

  .sidebar-item:hover {
    color: var(--text);
    background: var(--green-faint);
    border-left-color: var(--green-dim);
  }

  .sidebar-item.active {
    color: var(--green);
    background: rgba(122,255,74,0.05);
    border-left-color: var(--green);
    text-shadow: 0 0 6px rgba(122,255,74,0.3);
  }

  .sidebar-item .cat-icon {
    font-size: 0.85rem;
    flex-shrink: 0;
  }

  .sidebar-item .cat-name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .sidebar-item .cat-count {
    font-size: 0.65rem;
    color: var(--text-faint);
    background: var(--border);
    padding: 1px 5px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .sidebar-item.active .cat-count {
    background: var(--green-faint);
    color: var(--green-dim);
  }

  /* MAIN CONTENT */
  .main {
    padding: 24px;
    min-width: 0;
  }

  /* SEARCH */
  .search-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
    border: 1px solid var(--border-bright);
    background: var(--panel);
    padding: 10px 14px;
    position: relative;
  }

  .search-bar::before {
    content: '>';
    color: var(--green);
    font-size: 1rem;
    text-shadow: var(--glow-green);
    flex-shrink: 0;
  }

  .search-input {
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem;
    flex: 1;
    caret-color: var(--green);
  }

  .search-input::placeholder { color: var(--text-faint); }

  .search-count {
    font-size: 0.7rem;
    color: var(--text-faint);
    flex-shrink: 0;
  }

  /* CATEGORY HEADER */
  .cat-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .cat-header-icon { font-size: 1.2rem; }

  .cat-header-title {
    font-family: 'VT323', monospace;
    font-size: 1.5rem;
    color: var(--amber);
    text-shadow: var(--glow-amber);
    letter-spacing: 2px;
  }

  .cat-header-desc {
    font-size: 0.7rem;
    color: var(--text-faint);
    margin-left: auto;
  }

  /* CARDS GRID */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 10px;
  }

  .card {
    border: 1px solid var(--border);
    background: var(--panel);
    padding: 12px 14px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
    animation: fadeup 0.3s ease both;
    display: flex;
    flex-direction: column;
    gap: 6px;
    text-decoration: none;
    color: inherit;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: transparent;
    transition: all 0.15s;
  }

  .card:hover {
    border-color: var(--green-dim);
    background: var(--green-faint);
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4), var(--glow-green);
  }

  .card:hover::before {
    background: var(--green);
    box-shadow: var(--glow-green);
  }

  .card-title {
    font-size: 0.82rem;
    color: var(--text);
    line-height: 1.4;
    font-weight: 400;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  .card:hover .card-title { color: var(--green); }

  .card-url {
    font-size: 0.65rem;
    color: var(--text-faint);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .card-domain {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 0.62rem;
    color: var(--cyan-dim);
    background: rgba(74,255,236,0.05);
    border: 1px solid rgba(74,255,236,0.1);
    padding: 1px 6px;
    align-self: flex-start;
  }

  .card:hover .card-domain {
    color: var(--cyan);
    border-color: rgba(74,255,236,0.3);
    text-shadow: var(--glow-cyan);
  }

  /* ALL VIEW */
  .all-section {
    margin-bottom: 32px;
  }

  .all-section-title {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
  }

  .all-section-title .icon { font-size: 1rem; }
  .all-section-title .name {
    font-size: 0.85rem;
    color: var(--amber);
    letter-spacing: 1px;
  }
  .all-section-title .num {
    font-size: 0.7rem;
    color: var(--text-faint);
    margin-left: auto;
  }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    gap: 24px;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    font-size: 0.7rem;
    color: var(--text-dim);
  }

  .stat { display: flex; gap: 8px; align-items: center; }
  .stat-val { color: var(--green); text-shadow: var(--glow-green); font-size: 0.85rem; }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-faint);
    font-size: 0.8rem;
  }

  .empty .big { font-family: 'VT323', monospace; font-size: 3rem; color: var(--border-bright); display: block; margin-bottom: 12px; }

  /* CURSOR BLINK */
  .cursor {
    display: inline-block;
    width: 8px;
    height: 14px;
    background: var(--green);
    animation: blink 1s step-end infinite;
    vertical-align: middle;
    margin-left: 2px;
    box-shadow: var(--glow-green);
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 0; }
  ::-webkit-scrollbar-thumb:hover { background: var(--green-dim); }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--border);
    padding: 12px 24px;
    font-size: 0.65rem;
    color: var(--text-faint);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  footer .green { color: var(--green); }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .cards-grid { grid-template-columns: 1fr 1fr; }
  }

  @media (max-width: 480px) {
    .cards-grid { grid-template-columns: 1fr; }
  }

  /* stagger animation for cards */
  .card:nth-child(1) { animation-delay: 0.02s; }
  .card:nth-child(2) { animation-delay: 0.04s; }
  .card:nth-child(3) { animation-delay: 0.06s; }
  .card:nth-child(4) { animation-delay: 0.08s; }
  .card:nth-child(5) { animation-delay: 0.10s; }
  .card:nth-child(6) { animation-delay: 0.12s; }
  .card:nth-child(7) { animation-delay: 0.14s; }
  .card:nth-child(8) { animation-delay: 0.16s; }
  .card:nth-child(9) { animation-delay: 0.18s; }
  .card:nth-child(10) { animation-delay: 0.20s; }
</style>
</head>

// Flatten all items
const allItems = DATA.categories.flatMap(cat =>
  cat.items.map(item => ({ ...item, catId: cat.id, catName: cat.name, catIcon: cat.icon }))
);

let currentCat = 'all';
let searchQuery = '';

function getDomain(url) {
  try {
    const u = new URL(url);
    return u.hostname.replace('www.', '');
  } catch { return url.slice(0, 20); }
}

function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  let html = '<div class="sidebar-section">// CATEGORIES</div>';

  html += `<div class="sidebar-item ${currentCat === 'all' ? 'active' : ''}" onclick="selectCat('all')">
    <span class="cat-icon">📡</span>
    <span class="cat-name">ALL ENTRIES</span>
    <span class="cat-count">${allItems.length}</span>
  </div>`;

  DATA.categories.forEach(cat => {
    const active = currentCat === cat.id;
    html += `<div class="sidebar-item ${active ? 'active' : ''}" onclick="selectCat('${cat.id}')">
      <span class="cat-icon">${cat.icon}</span>
      <span class="cat-name">${cat.name}</span>
      <span class="cat-count">${cat.items.length}</span>
    </div>`;
  });

  sidebar.innerHTML = html;
}

function renderNavBar() {
  const nav = document.getElementById('navBar');
  let html = `<div class="nav-tab ${currentCat === 'all' ? 'active' : ''}" onclick="selectCat('all')">ALL</div>`;
  DATA.categories.forEach(cat => {
    html += `<div class="nav-tab ${currentCat === cat.id ? 'active' : ''}" onclick="selectCat('${cat.id}')">${cat.icon} ${cat.name}</div>`;
  });
  nav.innerHTML = html;
}

function makeCard(item, idx) {
  const domain = getDomain(item.url);
  return `<a class="card" href="${item.url}" target="_blank" rel="noopener" title="${item.title}" style="animation-delay:${Math.min(idx,15)*0.03}s">
    <div class="card-title">${item.title}</div>
    <div class="card-domain">${domain}</div>
  </a>`;
}

function renderContent() {
  const content = document.getElementById('content');
  const q = searchQuery.toLowerCase();

  let items = currentCat === 'all' ? allItems : allItems.filter(i => i.catId === currentCat);
  if (q) items = items.filter(i => i.title.toLowerCase().includes(q) || getDomain(i.url).includes(q));

  document.getElementById('visibleCount').textContent = items.length;
  document.getElementById('filterStatus').textContent = q ? 'ON' : 'OFF';
  document.getElementById('searchCount').textContent = q ? `${items.length} 结果` : '';

  if (items.length === 0) {
    content.innerHTML = `<div class="empty"><span class="big">404</span>没有找到匹配的书签<br><br>尝试其他关键词</div>`;
    return;
  }

  if (currentCat === 'all' && !q) {
    // Grouped view
    let html = '';
    DATA.categories.forEach(cat => {
      const catItems = items.filter(i => i.catId === cat.id);
      if (catItems.length === 0) return;
      html += `<div class="all-section">
        <div class="all-section-title">
          <span class="icon">${cat.icon}</span>
          <span class="name">${cat.name}</span>
          <span class="num">${catItems.length} entries</span>
        </div>
        <div class="cards-grid">
          ${catItems.map((item, i) => makeCard(item, i)).join('')}
        </div>
      </div>`;
    });
    content.innerHTML = html;
  } else {
    const cat = currentCat !== 'all' ? DATA.categories.find(c => c.id === currentCat) : null;
    let html = '';
    if (cat) {
      html += `<div class="cat-header">
        <span class="cat-header-icon">${cat.icon}</span>
        <span class="cat-header-title">${cat.name}</span>
        <span class="cat-header-desc">${cat.desc} · ${items.length} entries</span>
      </div>`;
    } else if (q) {
      html += `<div class="cat-header">
        <span class="cat-header-icon">🔍</span>
        <span class="cat-header-title">SEARCH: "${searchQuery}"</span>
        <span class="cat-header-desc">${items.length} results</span>
      </div>`;
    }
    html += `<div class="cards-grid">${items.map((item, i) => makeCard(item, i)).join('')}</div>`;
    content.innerHTML = html;
  }
}

function selectCat(id) {
  currentCat = id;
  document.getElementById('activeCat').textContent = id === 'all' ? 'ALL' : DATA.categories.find(c=>c.id===id)?.name || id;
  renderSidebar();
  renderNavBar();
  renderContent();
  window.scrollTo(0, 0);
}

document.getElementById('searchInput').addEventListener('input', function() {
  searchQuery = this.value.trim();
  if (searchQuery) currentCat = 'all';
  renderSidebar();
  renderNavBar();
  renderContent();
});

// Init
document.getElementById('totalCount').textContent = allItems.length;
document.getElementById('catCount').textContent = DATA.categories.length;
renderSidebar();
renderNavBar();
renderContent();
</script>
